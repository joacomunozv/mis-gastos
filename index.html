<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mis Gastos">
  <meta name="theme-color" content="#1a1a2e">
  <title>Mis Gastos</title>

  <style>
    :root {
      --bg:        #0f0f1a;
      --bg2:       #1a1a2e;
      --bg3:       #16213e;
      --card:      #1e2240;
      --border:    #2a2f55;
      --green:     #68d391;
      --blue:      #63b3ed;
      --red:       #fc8181;
      --yellow:    #f6e05e;
      --gray:      #a0aec0;
      --gray2:     #4a5568;
      --white:     #ffffff;
      --radius:    16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      min-height: 100vh;
      padding-bottom: 90px;
      padding-top: env(safe-area-inset-top);
    }

    /* ── HEADER */
    .header {
      background: linear-gradient(135deg, var(--bg2), var(--bg3));
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header p  { font-size: 12px; color: var(--gray); margin-top: 2px; }

    /* ── NAV */
    .nav {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }
    .nav-btn {
      flex: 1;
      padding: 12px 0 10px;
      border: none;
      background: none;
      color: var(--gray2);
      font-size: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: color .2s;
    }
    .nav-btn.active { color: var(--blue); }
    .nav-btn svg { width: 22px; height: 22px; }

    /* ── PAGES */
    .page { display: none; padding: 20px; }
    .page.active { display: block; }

    /* ── CARDS */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--gray);
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .card-value {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .card-sub {
      font-size: 12px;
      color: var(--gray);
      margin-top: 4px;
    }
    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .card-row:last-child { border-bottom: none; }

    /* ── COLORES */
    .green  { color: var(--green); }
    .blue   { color: var(--blue); }
    .red    { color: var(--red); }
    .yellow { color: var(--yellow); }
    .gray   { color: var(--gray); }

    /* ── GRID 2 COL */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .grid2 .card { margin-bottom: 0; }
    .grid2 .card-value { font-size: 22px; }

    /* ── CATEGORÍAS */
    .cat-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .cat-bar-label { font-size: 13px; flex: 1; }
    .cat-bar-val   { font-size: 13px; font-weight: 600; color: var(--green); min-width: 80px; text-align: right; }
    .cat-bar-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 4px;
      overflow: hidden;
    }
    .cat-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--green));
      border-radius: 2px;
      transition: width .5s ease;
    }

    /* ── HISTORIAL */
    .txn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .txn:last-child { border-bottom: none; }
    .txn-icon {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .txn-info { flex: 1; min-width: 0; }
    .txn-comercio {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .txn-meta { font-size: 11px; color: var(--gray); margin-top: 2px; }
    .txn-right { text-align: right; flex-shrink: 0; }
    .txn-monto { font-size: 14px; font-weight: 700; }
    .txn-estado {
      font-size: 10px;
      margin-top: 3px;
      padding: 2px 7px;
      border-radius: 20px;
      display: inline-block;
    }
    .estado-APROBADA  { background: #1a3a2a; color: var(--green); }
    .estado-IGNORADA  { background: #3a1a1a; color: var(--red); }
    .estado-PENDIENTE { background: #3a3a1a; color: var(--yellow); }

    /* ── ACCIONES HISTORIAL */
    .txn-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .btn-sm {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--white);
      font-size: 11px;
      cursor: pointer;
    }
    .btn-sm.green-btn { border-color: var(--green); color: var(--green); }
    .btn-sm.red-btn   { border-color: var(--red);   color: var(--red); }
    .btn-sm.blue-btn  { border-color: var(--blue);  color: var(--blue); }

    /* ── FORMULARIO */
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; color: var(--gray); margin-bottom: 6px; display: block; }
    .form-input, .form-select {
      width: 100%;
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--white);
      font-size: 16px;
      outline: none;
      -webkit-appearance: none;
    }
    .form-input:focus, .form-select:focus { border-color: var(--blue); }
    .form-select option { background: var(--card); }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #3b5bdb, #5c7cfa);
      border: none;
      border-radius: var(--radius-sm);
      color: var(--white);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-primary:active { opacity: .8; }
    .btn-primary:disabled { opacity: .4; }

    /* ── MODAL EDITAR */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 200;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      width: 100%;
      background: var(--bg2);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 20px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }
    .modal h3 { font-size: 18px; margin-bottom: 6px; }
    .modal p  { font-size: 13px; color: var(--gray); margin-bottom: 20px; }
    .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
    .btn-cancel {
      flex: 1; padding: 14px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--white);
      font-size: 15px; cursor: pointer;
    }
    .btn-confirm {
      flex: 2; padding: 14px;
      background: linear-gradient(135deg, #3b5bdb, #5c7cfa);
      border: none; border-radius: var(--radius-sm);
      color: var(--white); font-size: 15px; font-weight: 700; cursor: pointer;
    }

    /* ── TOAST */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%; transform: translateX(-50%);
      background: var(--card);
      border: 1px solid var(--border);
      padding: 12px 20px;
      border-radius: 30px;
      font-size: 14px;
      white-space: nowrap;
      z-index: 300;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* ── LOADER */
    .loader {
      text-align: center;
      padding: 40px;
      color: var(--gray);
      font-size: 14px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── BADGE PENDIENTES */
    .badge {
      background: var(--red);
      color: var(--white);
      font-size: 9px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 10px;
      position: absolute;
      top: 6px;
      right: 50%;
      transform: translateX(10px);
    }
    .nav-btn { position: relative; }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      margin-top: 4px;
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray);
      font-size: 14px;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>💸 Mis Gastos</h1>
  <p id="ultima-actualizacion">Cargando...</p>
</div>

<!-- PAGES -->
<div id="page-dashboard" class="page active">
  <div class="loader" id="loader-dashboard">
    <div class="spinner"></div>
    Cargando datos...
  </div>
  <div id="content-dashboard" style="display:none"></div>
</div>

<div id="page-historial" class="page">
  <div class="loader" id="loader-historial">
    <div class="spinner"></div>
    Cargando historial...
  </div>
  <div id="content-historial" style="display:none"></div>
</div>

<div id="page-agregar" class="page">
  <div class="card">
    <div class="card-title">➕ Nuevo gasto</div>
    <br>
    <div class="form-group">
      <label class="form-label">Monto (CLP)</label>
      <input id="inp-monto" class="form-input" type="number" inputmode="numeric" placeholder="15000">
    </div>
    <div class="form-group">
      <label class="form-label">Comercio</label>
      <input id="inp-comercio" class="form-input" type="text" placeholder="Ej: Copec, Jumbo...">
    </div>
    <div class="form-group">
      <label class="form-label">Categoría (opcional)</label>
      <select id="inp-categoria" class="form-select">
        <option value="">Detectar automáticamente</option>
        <option value="Supermercado">🛒 Supermercado</option>
        <option value="Bencina">⛽ Bencina</option>
        <option value="Restaurantes">🍽️ Restaurantes</option>
        <option value="Farmacia">💊 Farmacia</option>
        <option value="Vestuario">👕 Vestuario</option>
        <option value="Transporte">🚗 Transporte</option>
        <option value="Suscripciones">📱 Suscripciones</option>
        <option value="Salud">🏥 Salud</option>
        <option value="Otros">📦 Otros</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Fecha</label>
      <input id="inp-fecha" class="form-input" type="date">
    </div>
    <button class="btn-primary" id="btn-agregar" onclick="agregarGasto()">✅ Registrar gasto</button>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-dashboard" onclick="navTo('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    Dashboard
  </button>
  <button class="nav-btn" id="nav-historial" onclick="navTo('historial')">
    <span id="badge-pendientes" class="badge" style="display:none">0</span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
      <rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/>
      <line x1="9" y1="16" x2="13" y2="16"/>
    </svg>
    Historial
  </button>
  <button class="nav-btn" id="nav-agregar" onclick="navTo('agregar')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/>
      <line x1="8" y1="12" x2="16" y2="12"/>
    </svg>
    Agregar
  </button>
</nav>

<!-- MODAL EDITAR -->
<div class="modal-overlay" id="modal-editar">
  <div class="modal">
    <h3>✏️ Editar monto</h3>
    <p id="modal-desc">Comercio — monto actual</p>
    <div class="form-group">
      <label class="form-label">Nuevo monto (CLP)</label>
      <input id="modal-monto" class="form-input" type="number" inputmode="numeric" placeholder="12000">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-confirm" onclick="confirmarEdicion()">Confirmar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIGURACIÓN ─────────────────────────────
const API_URL = 'https://script.google.com/macros/s/AKfycbxHMCR_j8RrarpsKCxqTL-7qdQtqVqCSMcyCYR8bOiX5y3TncvTxyKhqgOT3b_HAYA/exec';
// ─────────────────────────────────────────────

let cache = { totales: null, historial: null };
let editando = { id: null, comercio: null, montoActual: 0 };

// ── NAVEGACIÓN
function navTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
  if (page === 'dashboard' && !cache.totales) cargarDashboard();
  if (page === 'historial' && !cache.historial) cargarHistorial();
  if (page === 'agregar') setFechaHoy();
}

// ── API
async function api(params) {
  const url = API_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  return res.json();
}

// ── DASHBOARD
async function cargarDashboard() {
  document.getElementById('loader-dashboard').style.display = 'block';
  document.getElementById('content-dashboard').style.display = 'none';
  try {
    const data = await api({ action: 'totales' });
    cache.totales = data;
    renderDashboard(data);
    document.getElementById('ultima-actualizacion').textContent = 'Actualizado: ' + (data.actualizado || '');
  } catch(e) {
    document.getElementById('loader-dashboard').innerHTML = '⚠️ Error al cargar datos';
  }
}

function renderDashboard(d) {
  const catData = cache.historial ? calcularCategorias(cache.historial.data || []) : [];

  let html = `
    <div class="grid2">
      <div class="card">
        <div class="card-title green">Esta semana</div>
        <div class="card-value green">${fmt(d.semana)}</div>
        <div class="card-sub">🧾 ${fmt(d.semana_compras)}</div>
        <div class="card-sub">🔁 ${fmt(d.semana_transf)}</div>
        <div class="card-sub gray">${d.movimientos_semana} movimientos</div>
      </div>
      <div class="card">
        <div class="card-title blue">Este mes</div>
        <div class="card-value blue">${fmt(d.mes)}</div>
        <div class="card-sub">🧾 ${fmt(d.mes_compras)}</div>
        <div class="card-sub">🔁 ${fmt(d.mes_transf)}</div>
      </div>
    </div>`;

  if (catData.length > 0) {
    const maxCat = catData[0].total;
    html += `<div class="section-title">Por categoría (mes)</div><div class="card">`;
    catData.forEach(c => {
      const pct = maxCat > 0 ? Math.round((c.total / maxCat) * 100) : 0;
      html += `
        <div style="margin-bottom:14px">
          <div class="cat-bar">
            <span class="cat-bar-label">${icono(c.cat)} ${c.cat}</span>
            <span class="cat-bar-val">${fmt(c.total)}</span>
          </div>
          <div class="cat-bar-track">
            <div class="cat-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>`;
    });
    html += `</div>`;
  }

  html += `
    <button class="btn-primary" onclick="cargarDashboard()" style="margin-top:0;background:var(--card);border:1px solid var(--border);color:var(--gray)">
      ↻ Actualizar
    </button>`;

  document.getElementById('content-dashboard').innerHTML = html;
  document.getElementById('loader-dashboard').style.display = 'none';
  document.getElementById('content-dashboard').style.display = 'block';
}

function calcularCategorias(txns) {
  const cats = {};
  const ahora = new Date();
  const inicioMes = new Date(ahora.getFullYear(), ahora.getMonth(), 1);

  txns.forEach(t => {
    if (t.estado !== 'APROBADA') return;
    const f = parseFecha(t.fecha);
    if (!f || f < inicioMes) return;
    const cat = t.categoria || 'Otros';
    cats[cat] = (cats[cat] || 0) + t.monto;
  });

  return Object.entries(cats)
    .map(([cat, total]) => ({ cat, total }))
    .sort((a, b) => b.total - a.total);
}

// ── HISTORIAL
async function cargarHistorial() {
  document.getElementById('loader-historial').style.display = 'block';
  document.getElementById('content-historial').style.display = 'none';
  try {
    const data = await api({ action: 'historial', limite: 50 });
    cache.historial = data;

    // Actualizar badge pendientes
    const pendientes = (data.data || []).filter(t => t.estado !== 'APROBADA' && t.estado !== 'IGNORADA').length;
    const badge = document.getElementById('badge-pendientes');
    if (pendientes > 0) {
      badge.textContent = pendientes;
      badge.style.display = 'block';
    } else {
      badge.style.display = 'none';
    }

    renderHistorial(data.data || []);

    // Si el dashboard está visible, actualizar categorías
    if (cache.totales) renderDashboard(cache.totales);

  } catch(e) {
    document.getElementById('loader-historial').innerHTML = '⚠️ Error al cargar historial';
  }
}

function renderHistorial(txns) {
  if (txns.length === 0) {
    document.getElementById('content-historial').innerHTML =
      `<div class="empty"><div class="empty-icon">📭</div>Sin transacciones</div>`;
    document.getElementById('loader-historial').style.display = 'none';
    document.getElementById('content-historial').style.display = 'block';
    return;
  }

  let html = `<div class="card">`;
  txns.forEach(t => {
    const estadoClass = t.estado === 'APROBADA' ? 'estado-APROBADA' : t.estado === 'IGNORADA' ? 'estado-IGNORADA' : 'estado-PENDIENTE';
    const estadoLabel = t.estado === 'APROBADA' ? '✅ Sumada' : t.estado === 'IGNORADA' ? '🚫 Ignorada' : '⏳ Pendiente';
    const montoColor  = t.estado === 'IGNORADA' ? 'red' : t.tipo === 'TRANSFERENCIA' ? 'blue' : 'green';

    let acciones = '';
    if (t.id) {
      acciones = `<div class="txn-actions">`;
      if (t.estado !== 'APROBADA')
        acciones += `<button class="btn-sm green-btn" onclick="decision('${t.id}','APROBADA')">✅ Sumar</button>`;
      if (t.estado !== 'IGNORADA')
        acciones += `<button class="btn-sm red-btn" onclick="decision('${t.id}','IGNORADA')">🚫 Ignorar</button>`;
      acciones += `<button class="btn-sm blue-btn" onclick="abrirEditar('${t.id}','${escHtml(t.comercio)}',${t.monto})">✏️ Editar</button>`;
      acciones += `</div>`;
    }

    html += `
      <div class="txn">
        <div class="txn-icon">${icono(t.categoria)}</div>
        <div class="txn-info">
          <div class="txn-comercio">${escHtml(t.comercio || 'Sin comercio')}</div>
          <div class="txn-meta">${t.fecha} · ${escHtml(t.banco || t.fuente || '')}</div>
          ${acciones}
        </div>
        <div class="txn-right">
          <div class="txn-monto ${montoColor}">$${fmtN(t.monto)}</div>
          <span class="txn-estado ${estadoClass}">${estadoLabel}</span>
        </div>
      </div>`;
  });
  html += `</div>`;

  html += `<button class="btn-primary" onclick="cargarHistorial()" style="background:var(--card);border:1px solid var(--border);color:var(--gray)">↻ Actualizar</button>`;

  document.getElementById('content-historial').innerHTML = html;
  document.getElementById('loader-historial').style.display = 'none';
  document.getElementById('content-historial').style.display = 'block';
}

// ── AGREGAR GASTO
function setFechaHoy() {
  const hoy = new Date();
  const yyyy = hoy.getFullYear();
  const mm   = String(hoy.getMonth() + 1).padStart(2, '0');
  const dd   = String(hoy.getDate()).padStart(2, '0');
  document.getElementById('inp-fecha').value = `${yyyy}-${mm}-${dd}`;
}

async function agregarGasto() {
  const monto    = parseInt(document.getElementById('inp-monto').value || '0', 10);
  const comercio = document.getElementById('inp-comercio').value.trim();
  const categoria= document.getElementById('inp-categoria').value;
  const fecha    = document.getElementById('inp-fecha').value; // yyyy-mm-dd

  if (!monto || monto <= 0) { toast('⚠️ Ingresa un monto válido'); return; }
  if (!comercio)            { toast('⚠️ Ingresa el nombre del comercio'); return; }

  const btn = document.getElementById('btn-agregar');
  btn.disabled = true;
  btn.textContent = 'Registrando...';

  try {
    const res = await api({ action: 'agregar', monto, comercio, categoria, fecha });
    if (res.ok) {
      toast('✅ Gasto registrado');
      document.getElementById('inp-monto').value    = '';
      document.getElementById('inp-comercio').value = '';
      document.getElementById('inp-categoria').value= '';
      setFechaHoy();
      cache.totales  = null;
      cache.historial= null;
      setTimeout(() => navTo('dashboard'), 800);
    } else {
      toast('⚠️ Error: ' + (res.error || 'desconocido'));
    }
  } catch(e) {
    toast('⚠️ Error de conexión');
  } finally {
    btn.disabled = false;
    btn.textContent = '✅ Registrar gasto';
  }
}

// ── DECISIÓN
async function decision(id, estado) {
  try {
    const res = await api({ action: 'decision', id, estado });
    if (res.ok) {
      toast(estado === 'APROBADA' ? '✅ Sumada al total' : '🚫 Ignorada');
      cache.historial = null;
      cache.totales   = null;
      setTimeout(() => cargarHistorial(), 400);
    } else {
      toast('⚠️ ' + (res.error || 'Error'));
    }
  } catch(e) {
    toast('⚠️ Error de conexión');
  }
}

// ── MODAL EDITAR
function abrirEditar(id, comercio, montoActual) {
  editando = { id, comercio, montoActual };
  document.getElementById('modal-desc').textContent = `${comercio} — actual: $${fmtN(montoActual)}`;
  document.getElementById('modal-monto').value = '';
  document.getElementById('modal-editar').classList.add('open');
  setTimeout(() => document.getElementById('modal-monto').focus(), 300);
}
function cerrarModal() {
  document.getElementById('modal-editar').classList.remove('open');
}
async function confirmarEdicion() {
  const nuevoMonto = parseInt(document.getElementById('modal-monto').value || '0', 10);
  if (!nuevoMonto || nuevoMonto <= 0) { toast('⚠️ Monto inválido'); return; }
  cerrarModal();
  try {
    const res = await api({ action: 'editar', id: editando.id, monto: nuevoMonto });
    if (res.ok) {
      toast(`✏️ $${fmtN(res.montoAnterior)} → $${fmtN(res.montoNuevo)}`);
      cache.historial = null;
      cache.totales   = null;
      setTimeout(() => cargarHistorial(), 400);
    } else {
      toast('⚠️ ' + (res.error || 'Error'));
    }
  } catch(e) {
    toast('⚠️ Error de conexión');
  }
}

// ── HELPERS
function fmt(n)   { return '$' + fmtN(n); }
function fmtN(n)  { return Number(n||0).toLocaleString('es-CL'); }
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function parseFecha(str) {
  if (!str) return null;
  const p = str.split(' ')[0].split('/');
  if (p.length < 3) return null;
  return new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
}
function icono(cat) {
  const map = {
    'Supermercado':'🛒','Bencina':'⛽','Restaurantes':'🍽️','Farmacia':'💊',
    'Vestuario':'👕','Transporte':'🚗','Suscripciones':'📱','Salud':'🏥',
    'Transferencia':'🔁','Otros':'📦'
  };
  return map[cat] || '💳';
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── INIT
window.addEventListener('DOMContentLoaded', () => {
  setFechaHoy();
  cargarDashboard();
  cargarHistorial();
});
</script>
